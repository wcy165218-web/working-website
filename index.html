<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 工具箱</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { color: #1e293b; margin-bottom: 30px; }
        
        .grid {
            display: grid;
            /* 稍微调大了 minmax 的最小值，从 280px 改为 320px，保证 PC 端更宽敞 */
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            /* 扩大了总容器宽度，从 1000px 增加到 1200px */
            max-width: 1200px;
        }
        
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
            /* 确保卡片内部不会撑破 */
            overflow: hidden; 
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
        }

        /* 重点优化：标题部分 */
        .card h3 { 
            margin: 0 0 10px 0; 
            color: var(--primary-color); 
            font-size: 1.25rem;
            /* 以下三行保证标题长了不换行，而是显示省略号 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card p { 
            margin: 0; 
            color: #64748b; 
            font-size: 0.95rem; 
            line-height: 1.6;
            /* 描述部分如果太长，超过 2 行会显示省略号 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>🛠️ 常用工具箱</h1>

    <div class="grid">
        <a href="./2026福州渔博会补贴政策对比工具/index.html" class="card">
            <h3>2026福州渔博会补贴政策对比工具</h3>
            <p>用于自行分析补贴政策前后对比，谨慎发送给客户</p>
            <span class="tag">效率工具</span>
        </a>

        <div class="grid">
        <a href="./代收代付开票金额计算/index.html" class="card">
            <h3>代收代付开票金额计算</h3>
            <p>最大程度避免代收代付产生的税差</p>
            <span class="tag">效率工具</span>
        </a>

        </div>

</body>

</html>
