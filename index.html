<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用工具箱</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { color: #1e293b; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .card h3 { margin: 0 0 10px 0; color: var(--primary-color); }
        .card p { margin: 0; color: #64748b; font-size: 0.9rem; line-height: 1.5; }
        .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🛠️ 常用工具箱</h1>

    <div class="grid">
        <a href="./2026福州渔博会补贴政策对比工具/index.html" class="card">
            <h3>2026福州渔博会补贴政策对比工具</h3>
            <p>用于自行分析补贴政策前后对比，谨慎发送给客户</p>
            <span class="tag">效率工具</span>
        </a>


        </div>

</body>
</html>
