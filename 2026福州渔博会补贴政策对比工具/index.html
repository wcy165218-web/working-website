<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福州渔博会补贴政策前后对比</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --table-border: #e0e0e0;
            --increase: #d32f2f; /* 红色：支出增加 */
            --decrease: #2e7d32; /* 绿色：支出减少 */
            --bg-red: #ffebee;
            --bg-green: #e8f5e9;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px; /* 手机端减少页边距 */
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h2 { font-size: 1.5rem; margin-top: 10px; } /* 响应式标题 */
        h2, h3 { text-align: center; color: var(--primary); }
        h3 { margin-top: 30px; border-left: 4px solid var(--accent); padding-left: 10px; text-align: left; font-size: 1.1rem; }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* 缩小最小宽度适配手机 */
            gap: 12px;
            background: #f1f4f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-item { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; /* 16px防止iOS点击缩放 */ }

        .checkbox-row {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            border: 1px dashed var(--accent);
            font-weight: bold;
            font-size: 13px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            grid-column: 1 / -1;
            transition: 0.3s;
            margin-top: 5px;
        }

        button:hover { background: #2980b9; }

        /* 核心改进：表格容器在手机上可横向滑动 */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* 流畅滑动 */
            margin-top: 10px;
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; background: white; min-width: 500px; /* 保证手机端不至于挤在一起 */ }
        th, td { border: 1px solid var(--table-border); padding: 10px 8px; text-align: right; font-size: 13px; }
        th { background: #f8f9fa; text-align: center; font-size: 13px; }
        td:first-child { text-align: left; font-weight: 500; min-width: 120px; }

        .row-group { background: #fffbf0; font-weight: bold; text-align: left; }
        .final-row { background: #ebf5ff; font-weight: bold; }
        
        .diff-plus { color: var(--increase); font-weight: bold; }  
        .diff-minus { color: var(--decrease); font-weight: bold; } 
        
        .summary-box {
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px; /* 手机端字号适中 */
            font-weight: bold;
            line-height: 1.4;
            transition: all 0.3s ease;
        }

        .win-tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 2px; color: white; white-space: nowrap; }
        .tag-new { background-color: var(--decrease); }
        .tag-old { background-color: var(--increase); }
        .theme-highlight { color: #8e44ad; font-weight: bold; }

        /* 针对超窄屏幕的微调 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 12px; }
            h2 { font-size: 1.25rem; }
            .input-grid { padding: 10px; gap: 8px; }
            button { padding: 15px; } /* 增大点击区域 */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>福州渔博会补贴政策对比</h2>
    
    <div class="input-grid">
        <div class="input-item">
            <label>展位费定价 (元/㎡)</label>
            <input type="number" id="priceBooth" value="580" inputmode="decimal">
        </div>
        <div class="input-item">
            <label>搭建费定价 (元/㎡)</label>
            <input type="number" id="priceConst" value="1000" inputmode="decimal">
        </div>
        <div class="input-item">
            <label>测算面积 (㎡)</label>
            <input type="number" id="area" value="180" inputmode="numeric">
        </div>
        <div class="input-item">
            <label>活动额外支出 (元)</label>
            <input type="number" id="themeCost" value="100000" inputmode="numeric">
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="checkTheme" checked>
            <label for="checkTheme" style="cursor:pointer;">测算包含【主题活动】 (≥180㎡)</label>
        </div>
        <button onclick="runAnalysis()">立即对比方案</button>
    </div>

    <div id="resultContent" style="display:none;">
        <h3>1. 费用与补贴明细</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>项目明细</th>
                        <th>原方案</th>
                        <th>现方案</th>
                        <th>差额</th>
                    </tr>
                </thead>
                <tbody id="detailBody"></tbody>
            </table>
        </div>
        
        <div id="verdict" class="summary-box"></div>

        <h3>2. 多面积梯度快报</h3>
        <div class="table-wrapper">
            <table class="list-table">
                <thead>
                    <tr>
                        <th>面积</th>
                        <th>总支出</th>
                        <th>原补贴</th>
                        <th>现补贴</th>
                        <th>花费差异</th>
                        <th>优势</th>
                    </tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
        
        <div style="margin-top:15px; padding:12px; border-radius:6px; background:#fdfaff; border:1px solid #e0d0f0; font-size:12px; color:#666; line-height:1.5;">
            <strong>📝 政策核心摘要：</strong><br>
            • <strong>基础补贴：</strong>原方案定额上限10万；现方案按50%比例上限5万。<br>
            • <strong>主题活动：</strong>面积满180㎡举办活动，均额外补贴固定 10万元。<br>
            • <strong>差异说明：</strong>正数代表现方案支出更高，负数代表现方案更省。
        </div>
    </div>
</div>

<script>
    function format(num) { return Math.round(num).toLocaleString('zh-CN'); }

    function calculateData(pBooth, pConst, area, tCost, userWantsTheme) {
        const costBaseTotal = (pBooth + pConst) * area;
        const isEligible = (area >= 180 && userWantsTheme);
        const actualTCost = isEligible ? tCost : 0;
        const totalExp = costBaseTotal + actualTCost;

        const subBaseOrig = Math.min((area / 9) * 5000, 100000); 
        const subThemeOrig = isEligible ? 100000 : 0;
        const subTotalOrig = subBaseOrig + subThemeOrig;

        const subBaseNew = Math.min(costBaseTotal * 0.5, 50000);
        const subThemeNew = isEligible ? 100000 : 0; 
        const subTotalNew = subBaseNew + subThemeNew;

        return {
            isTheme: isEligible,
            area,
            costBooth: pBooth * area,
            costConst: pConst * area,
            actualTCost,
            totalExp,
            subBaseOrig,
            subThemeOrig,
            subTotalOrig,
            subBaseNew,
            subThemeNew,
            subTotalNew,
            finalOrig: totalExp - subTotalOrig,
            finalNew: totalExp - subTotalNew
        };
    }

    function runAnalysis() {
        const pBooth = parseFloat(document.getElementById('priceBooth').value) || 0;
        const pConst = parseFloat(document.getElementById('priceConst').value) || 0;
        const curArea = parseFloat(document.getElementById('area').value) || 0;
        const tCost = parseFloat(document.getElementById('themeCost').value) || 0;
        const wantsTheme = document.getElementById('checkTheme').checked;

        const d = calculateData(pBooth, pConst, curArea, tCost, wantsTheme);
        
        let detailHtml = `
            <tr class="row-group"><td colspan="4">【支出项】</td></tr>
            <tr><td>展位费 (${d.area}㎡)</td><td>${format(d.costBooth)}</td><td>${format(d.costBooth)}</td><td>-</td></tr>
            <tr><td>搭建费 (${d.area}㎡)</td><td>${format(d.costConst)}</td><td>${format(d.costConst)}</td><td>-</td></tr>
            <tr><td>活动额外支出</td><td>${format(d.actualTCost)}</td><td>${format(d.actualTCost)}</td><td>-</td></tr>
            <tr class="row-group"><td colspan="4">【补贴金额】</td></tr>
            <tr><td>基础补贴</td><td>${format(d.subBaseOrig)}</td><td>${format(d.subBaseNew)}</td><td class="${d.subBaseNew < d.subBaseOrig ? 'diff-plus':''}">${format(d.subBaseNew - d.subBaseOrig)}</td></tr>
            <tr><td>主题活动补贴</td><td>${format(d.subThemeOrig)}</td><td>${format(d.subThemeNew)}</td><td>-</td></tr>
            <tr class="final-row"><td>最终实付总额</td><td>${format(d.finalOrig)}</td><td>${format(d.finalNew)}</td><td class="${d.finalNew > d.finalOrig ? 'diff-plus':'diff-minus'}">${format(d.finalNew - d.finalOrig)}</td></tr>
        `;
        document.getElementById('detailBody').innerHTML = detailHtml;

        const v = document.getElementById('verdict');
        const diff = d.finalNew - d.finalOrig;
        
        if (diff > 0) {
            v.style.background = "var(--bg-red)";
            v.style.color = "var(--increase)";
            v.style.border = "1px solid #ffcdd2";
            v.innerHTML = `⚠️ 原方案更划算<br>现方案多出 ¥${format(diff)}`;
        } else if (diff < 0) {
            v.style.background = "var(--bg-green)";
            v.style.color = "var(--decrease)";
            v.style.border = "1px solid #c8e6c9";
            v.innerHTML = `✅ 现方案更划算<br>可省下 ¥${format(Math.abs(diff))}`;
        } else {
            v.style.background = "#f5f5f5";
            v.style.color = "#666";
            v.style.border = "1px solid #ddd";
            v.innerHTML = "方案支出一致";
        }

        const configs = [
            {a: 36, t: false}, {a: 54, t: false}, {a: 72, t: false}, 
            {a: 90, t: false}, {a: 108, t: false}, {a: 135, t: false}, 
            {a: 180, t: false}, {a: 180, t: true}
        ];
        
        let listHtml = "";
        configs.forEach(c => {
            const res = calculateData(pBooth, pConst, c.a, tCost, c.t);
            const totalDiff = res.finalNew - res.finalOrig;
            const advantage = totalDiff < 0 ? '<span class="win-tag tag-new">现方案</span>' : (totalDiff > 0 ? '<span class="win-tag tag-old">原方案</span>' : '<span class="win-tag" style="background:#95a5a6">无差异</span>');
            const label = c.t ? `<span class="theme-highlight">${c.a}㎡ (含活动)</span>` : `${c.a}㎡`;
            
            listHtml += `
                <tr>
                    <td>${label}</td>
                    <td>${format(res.totalExp)}</td>
                    <td>${format(res.subTotalOrig)}</td>
                    <td>${format(res.subTotalNew)}</td>
                    <td class="${totalDiff > 0 ? 'diff-plus' : (totalDiff < 0 ? 'diff-minus' : '')}">${totalDiff > 0 ? '+' : ''}${format(totalDiff)}</td>
                    <td style="text-align:center">${advantage}</td>
                </tr>
            `;
        });
        document.getElementById('listBody').innerHTML = listHtml;
        document.getElementById('resultContent').style.display = 'block';
        
        // 点击后滚动到结果区
        document.getElementById('resultContent').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
