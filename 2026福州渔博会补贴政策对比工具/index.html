<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福州渔博会补贴政策前后对比</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --table-border: #e0e0e0;
            --increase: #d32f2f;
            --decrease: #2e7d32;
            --bg-red: #ffebee;
            --bg-green: #e8f5e9;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px; /* 进一步缩小边距 */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h2 { font-size: 1.3rem; margin: 10px 0; text-align: center; color: var(--primary); }
        h3 { margin-top: 25px; border-left: 4px solid var(--accent); padding-left: 10px; text-align: left; font-size: 1rem; color: var(--primary); }

        /* 输入面板适配 */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 手机端强制两列 */
            gap: 10px;
            background: #f1f4f7;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-item { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }

        .checkbox-row {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff;
            padding: 8px;
            border-radius: 4px;
            border: 1px dashed var(--accent);
            font-size: 12px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            grid-column: 1 / -1;
            margin-top: 5px;
        }

        /* 核心：解决溢出的滚动容器 */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
            border: 1px solid var(--table-border);
            border-radius: 6px;
            position: relative;
        }

        table { 
            width: 100%; 
            border-collapse: separate; /* 为了首列固定，必须设为separate */
            border-spacing: 0;
            background: white; 
            min-width: 650px; /* 强制表格宽度，确保不挤压 */
        }

        th, td { 
            border-right: 1px solid var(--table-border); 
            border-bottom: 1px solid var(--table-border); 
            padding: 10px 8px; 
            text-align: right; 
            font-size: 13px;
            white-space: nowrap; /* 强制不换行，解决图片里的垂直堆叠问题 */
        }

        th { background: #2c3e50 !important; color: white; text-align: center; }

        /* 手机端首列固定逻辑 */
        td:first-child, th:first-child {
            position: sticky;
            left: 0;
            z-index: 2;
            background-color: #f9f9f9;
            text-align: left;
            font-weight: bold;
            min-width: 90px;
            border-right: 2px solid var(--table-border);
        }
        th:first-child { z-index: 3; background: #2c3e50 !important; }

        .row-group { background: #fffbf0; font-weight: bold; text-align: left; }
        .final-row { background: #ebf5ff; font-weight: bold; }
        
        .diff-plus { color: var(--increase); font-weight: bold; }  
        .diff-minus { color: var(--decrease); font-weight: bold; } 
        
        .summary-box {
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            line-height: 1.5;
        }

        .win-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; color: white; display: inline-block; }
        .tag-new { background-color: var(--decrease); }
        .tag-old { background-color: var(--increase); }
        .tag-none { background-color: #95a5a6; }

        /* 滚动提示 */
        .scroll-hint {
            text-align: right;
            font-size: 10px;
            color: #999;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>福州渔博会补贴对比分析</h2>
    
    <div class="input-grid">
        <div class="input-item"><label>展位费 (元/㎡)</label><input type="number" id="priceBooth" value="580"></div>
        <div class="input-item"><label>搭建费 (元/㎡)</label><input type="number" id="priceConst" value="1000"></div>
        <div class="input-item"><label>面积 (㎡)</label><input type="number" id="area" value="180"></div>
        <div class="input-item"><label>活动支出 (元)</label><input type="number" id="themeCost" value="100000"></div>
        <div class="checkbox-row">
            <input type="checkbox" id="checkTheme" checked>
            <label for="checkTheme">包含主题活动 (≥180㎡生效)</label>
        </div>
        <button onclick="runAnalysis()">开始计算对比</button>
    </div>

    <div id="resultContent" style="display:none;">
        <div id="verdict" class="summary-box"></div>

        <h3>1. 费用支出与补贴明细</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>项目明细</th><th>原方案</th><th>现方案</th><th>差额</th></tr>
                </thead>
                <tbody id="detailBody"></tbody>
            </table>
        </div>
        
        <h3>2. 不同面积梯度对比列表</h3>
        <div class="scroll-hint">左右滑动查看完整数据 ➔</div>
        <div class="table-wrapper">
            <table id="listTable">
                <thead>
                    <tr>
                        <th>展位面积</th>
                        <th>总支出</th>
                        <th>原补贴</th>
                        <th>现补贴</th>
                        <th>花费差异</th>
                        <th>优势方案</th>
                    </tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function format(n) { return Math.round(n).toLocaleString(); }

    function calculate(pb, pc, a, tc, want) {
        const costBase = (pb + pc) * a;
        const isT = (a >= 180 && want);
        const totalExp = costBase + (isT ? tc : 0);
        const sBO = Math.min((a / 9) * 5000, 100000);
        const sTO = isT ? 100000 : 0;
        const sBN = Math.min(costBase * 0.5, 50000);
        const sTN = isT ? 100000 : 0;
        return {
            totalExp, sO: sBO + sTO, sN: sBN + sTN,
            fO: totalExp - (sBO + sTO), fN: totalExp - (sBN + sTN),
            costBooth: pb * a, costConst: pc * a, actC: isT ? tc : 0
        };
    }

    function runAnalysis() {
        const pb = parseFloat(document.getElementById('priceBooth').value) || 0;
        const pc = parseFloat(document.getElementById('priceConst').value) || 0;
        const a = parseFloat(document.getElementById('area').value) || 0;
        const tc = parseFloat(document.getElementById('themeCost').value) || 0;
        const want = document.getElementById('checkTheme').checked;

        const d = calculate(pb, pc, a, tc, want);
        
        // 明细渲染
        document.getElementById('detailBody').innerHTML = `
            <tr><td>展位+搭建支出</td><td>${format(d.costBooth+d.costConst)}</td><td>${format(d.costBooth+d.costConst)}</td><td>-</td></tr>
            <tr><td>活动额外支出</td><td>${format(d.actC)}</td><td>${format(d.actC)}</td><td>-</td></tr>
            <tr class="final-row"><td>补贴总计</td><td>${format(d.sO)}</td><td>${format(d.sN)}</td><td class="${d.sN<d.sO?'diff-plus':''}">${format(d.sN-d.sO)}</td></tr>
            <tr class="final-row"><td>企业最终实付</td><td>${format(d.fO)}</td><td>${format(d.fN)}</td><td class="${d.fN>d.fO?'diff-plus':'diff-minus'}">${format(d.fN-d.fO)}</td></tr>
        `;

        // 结论框
        const v = document.getElementById('verdict');
        const diff = d.fN - d.fO;
        v.style.background = diff > 0 ? "var(--bg-red)" : (diff < 0 ? "var(--bg-green)" : "#f5f5f5");
        v.style.color = diff > 0 ? "var(--increase)" : (diff < 0 ? "var(--decrease)" : "#666");
        v.innerHTML = diff > 0 ? `⚠️ 原方案更划算<br>现方案多出支出 ¥${format(diff)}` : (diff < 0 ? `✅ 现方案更划算<br>可省下支出 ¥${format(Math.abs(diff))}` : "方案支出一致");

        // 列表渲染
        const configs = [{a:36,t:0},{a:54,t:0},{a:72,t:0},{a:81,t:0},{a:90,t:0},{a:108,t:0},{a:135,t:0},{a:180,t:0},{a:180,t:1}];
        let listHtml = "";
        configs.forEach(c => {
            const res = calculate(pb, pc, c.a, tc, c.t);
            const df = res.fN - res.fO;
            const tag = df < 0 ? '<span class="win-tag tag-new">现方案</span>' : (df > 0 ? '<span class="win-tag tag-old">原方案</span>' : '<span class="win-tag tag-none">无差异</span>');
            listHtml += `<tr>
                <td>${c.a}㎡${c.t?'*':''}</td>
                <td>${format(res.totalExp)}</td>
                <td>${format(res.sO)}</td>
                <td>${format(res.sN)}</td>
                <td class="${df>0?'diff-plus':(df<0?'diff-minus':'')}">${df>0?'+':''}${format(df)}</td>
                <td style="text-align:center">${tag}</td>
            </tr>`;
        });
        document.getElementById('listBody').innerHTML = listHtml;
        document.getElementById('resultContent').style.display = 'block';
        document.getElementById('resultContent').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
